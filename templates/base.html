<!DOCTYPE html>
<html lang="zh-Hant" data-theme="night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PersoChattai{% endblock %}</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#e94560">

  <!-- Tailwind CSS + DaisyUI (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/css/app.css">

  {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-base-100">

  <!-- Desktop Navbar -->
  <nav aria-label="主選單" class="navbar bg-base-200 shadow-md hidden md:flex px-6 lg:px-10">
    <div class="flex-1">
      <a href="/materials" class="btn btn-ghost text-2xl font-bold tracking-tight">
        <span class="text-primary">Perso</span>Chattai
      </a>
    </div>
    <div class="flex-none flex items-center gap-2">
      <ul class="menu menu-horizontal px-1 gap-2 text-base">
        <li>
          <a href="/materials" data-nav-link class="rounded-lg px-4 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            素材管理
          </a>
        </li>
        <li>
          <a href="/roleplay" data-nav-link class="rounded-lg px-4 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
            </svg>
            Role Play
          </a>
        </li>
        <li>
          <a href="/report" data-nav-link class="rounded-lg px-4 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            能力報告
          </a>
        </li>
      </ul>
      <div id="user-badge" class="hidden">
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="btn btn-ghost btn-sm gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span id="user-display-name"></span>
          </div>
          <ul tabindex="0" class="dropdown-content menu bg-base-200 rounded-box z-50 w-36 p-2 shadow">
            <li><a onclick="switchUser()">換人</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile Top Bar -->
  <nav aria-label="行動版標題列" class="navbar bg-base-200 shadow-md md:hidden">
    <div class="flex-1">
      <span class="text-lg font-bold tracking-tight">
        <span class="text-primary">Perso</span>Chattai
      </span>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 container mx-auto px-4 py-6 pb-20 md:px-8 md:py-8 md:pb-8 lg:px-12" hx-boost="true">
    {% block content %}{% endblock %}
  </main>

  <!-- Mobile Bottom Navigation -->
  <div class="btm-nav btm-nav-wrapper bg-base-200 md:hidden">
    <a href="/materials" data-nav-link>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      <span class="btm-nav-label text-xs">素材</span>
    </a>
    <a href="/roleplay" data-nav-link>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
      </svg>
      <span class="btm-nav-label text-xs">Role Play</span>
    </a>
    <a href="/report" data-nav-link>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <span class="btm-nav-label text-xs">報告</span>
    </a>
  </div>

  {% include "partials/nickname_modal.html" %}

  <!-- Custom JS -->
  <script src="/static/js/app.js?v=2"></script>
</body>
</html>
